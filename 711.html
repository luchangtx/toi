<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰球比赛计时与统计系统</title>
    <link href="./statics/css/base.css" rel="stylesheet">
    <style>
        :root {
            --bg-root: #070b14;
            --bg-surface: #0d1424;
            --bg-elevated: #141e34;
            --border-subtle: rgba(56, 189, 248, 0.07);
            --border-default: rgba(56, 189, 248, 0.14);
            --border-active: rgba(34, 211, 238, 0.45);
            --border-selected: rgba(34, 211, 238, 0.65);
            --accent-ice: #22d3ee;
            --accent-ice-dim: #0891b2;
            --accent-red: #f43f5e;
            --accent-green: #10b981;
            --accent-amber: #f59e0b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --warning-color: #f59e0b;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 10px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 20px rgba(34, 211, 238, 0.15);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --glass-bg-controls: rgba(13, 20, 36, 0.8);
            --glass-bg-card: rgba(15, 22, 36, 0.7);
            --glass-bg-card-hover: rgba(20, 30, 50, 0.75);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-bg-hover: rgba(255, 255, 255, 0.08);
            --glass-bg-input: rgba(0, 0, 0, 0.2);
            --glass-row-hover: rgba(255, 255, 255, 0.02);
            --th-bg: rgba(14, 165, 233, 0.08);
            --timer-bg: rgba(34, 211, 238, 0.06);
            --timer-border: rgba(34, 211, 238, 0.2);
            --timer-glow: 0 0 12px rgba(34, 211, 238, 0.3);
            --body-grad-top: rgba(14, 165, 233, 0.04);
            --body-grad-bot: rgba(14, 165, 233, 0.03);
            --glow-success: 0 0 16px rgba(16, 185, 129, 0.3);
            --danger-border: rgba(244, 63, 94, 0.4);
            --danger-bg-hover: rgba(244, 63, 94, 0.1);
            --amber-border: rgba(245, 158, 11, 0.35);
            --amber-bg-hover: rgba(245, 158, 11, 0.1);
            --selected-bg: rgba(14, 165, 233, 0.08);
            --selected-number-glow: 0 0 16px rgba(34, 211, 238, 0.4);
            --role-bg: rgba(255, 255, 255, 0.06);
            --edit-btn-bg: rgba(255, 255, 255, 0.06);
            --edit-btn-hover: rgba(34, 211, 238, 0.1);
            --score-shadow: 0 2px 8px rgba(244, 63, 94, 0.4);
            --focus-ring: 0 0 0 3px rgba(34, 211, 238, 0.12);
            --modal-backdrop: rgba(0, 0, 0, 0.65);
            --close-hover: rgba(244, 63, 94, 0.08);
            --modal-btn-glow: 0 0 16px rgba(34, 211, 238, 0.3);
            --toast-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
        }

        body.light {
            --bg-root: #f1f5f9;
            --bg-surface: #ffffff;
            --bg-elevated: #f8fafc;
            --border-subtle: rgba(14, 165, 233, 0.1);
            --border-default: rgba(14, 165, 233, 0.2);
            --border-active: rgba(8, 145, 178, 0.5);
            --border-selected: rgba(8, 145, 178, 0.7);
            --accent-ice: #0891b2;
            --accent-ice-dim: #0e7490;
            --accent-red: #e11d48;
            --accent-green: #059669;
            --accent-amber: #d97706;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --warning-color: #d97706;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-glow: 0 0 20px rgba(8, 145, 178, 0.12);
            --glass-bg-controls: rgba(255, 255, 255, 0.85);
            --glass-bg-card: rgba(255, 255, 255, 0.85);
            --glass-bg-card-hover: rgba(248, 250, 252, 0.95);
            --glass-bg: rgba(0, 0, 0, 0.04);
            --glass-bg-hover: rgba(0, 0, 0, 0.06);
            --glass-bg-input: rgba(0, 0, 0, 0.04);
            --glass-row-hover: rgba(0, 0, 0, 0.02);
            --th-bg: rgba(8, 145, 178, 0.06);
            --timer-bg: rgba(8, 145, 178, 0.06);
            --timer-border: rgba(8, 145, 178, 0.2);
            --timer-glow: none;
            --body-grad-top: rgba(14, 165, 233, 0.06);
            --body-grad-bot: rgba(14, 165, 233, 0.04);
            --glow-success: 0 0 16px rgba(5, 150, 105, 0.2);
            --danger-border: rgba(225, 29, 72, 0.4);
            --danger-bg-hover: rgba(225, 29, 72, 0.08);
            --amber-border: rgba(217, 119, 6, 0.3);
            --amber-bg-hover: rgba(217, 119, 6, 0.08);
            --selected-bg: rgba(8, 145, 178, 0.08);
            --selected-number-glow: none;
            --role-bg: rgba(0, 0, 0, 0.05);
            --edit-btn-bg: rgba(0, 0, 0, 0.05);
            --edit-btn-hover: rgba(8, 145, 178, 0.1);
            --score-shadow: 0 2px 8px rgba(225, 29, 72, 0.3);
            --focus-ring: 0 0 0 3px rgba(8, 145, 178, 0.12);
            --modal-backdrop: rgba(0, 0, 0, 0.4);
            --close-hover: rgba(225, 29, 72, 0.06);
            --modal-btn-glow: 0 0 16px rgba(8, 145, 178, 0.2);
            --toast-shadow: 0 4px 16px rgba(5, 150, 105, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-root);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% 0%, var(--body-grad-top) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 50% 100%, var(--body-grad-bot) 0%, transparent 70%);
            color: var(--text-primary);
            padding: 24px 20px 40px;
            min-height: 100vh;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Controls Bar ── */
        .controls {
            background: var(--glass-bg-controls);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            border: 1px solid var(--border-default);
            padding: 14px 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: sticky;
            top: 12px;
            z-index: 100;
        }

        /* ── Global Timer ── */
        #globalTimer {
            font-size: 38px;
            padding: 8px 18px;
            margin: 0 8px;
            font-weight: 700;
            color: var(--accent-ice);
            background: var(--timer-bg);
            border: 1px solid var(--timer-border);
            border-radius: var(--radius-md);
            font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Courier New', monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            min-width: 140px;
            text-align: center;
            text-shadow: var(--timer-glow);
        }

        /* ── Control Buttons ── */
        .controls button {
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
        }

        .controls button:not(.disabled):active {
            transform: scale(0.97);
        }

        /* Primary action (start) */
        .controls button.success {
            background: var(--accent-green);
            color: #fff;
            border-color: var(--accent-green);
        }
        .controls button.success:hover:not(.disabled) {
            background: #059669;
            box-shadow: var(--glow-success);
        }

        /* Danger (reset) */
        .controls button.danger {
            background: transparent;
            color: var(--accent-red);
            border-color: var(--danger-border);
        }
        .controls button.danger:hover:not(.disabled) {
            background: var(--danger-bg-hover);
            border-color: var(--accent-red);
        }

        /* Accent (score/goal buttons) */
        .controls button.accent {
            background: transparent;
            color: var(--accent-amber);
            border-color: var(--amber-border);
        }
        .controls button.accent:hover:not(.disabled) {
            background: var(--amber-bg-hover);
            border-color: var(--accent-amber);
        }

        /* Secondary (most buttons) */
        .controls button.secondary {
            background: var(--glass-bg);
            color: var(--text-secondary);
            border-color: var(--border-subtle);
        }
        .controls button.secondary:hover:not(.disabled) {
            background: var(--glass-bg-hover);
            color: var(--text-primary);
            border-color: var(--border-default);
        }

        .disabled {
            opacity: 0.3 !important;
            cursor: not-allowed !important;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ── Fast controls (rewind/forward) ── */
        .fast-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            margin: 0 6px;
        }
        .fast-controls button {
            padding: 9px 12px;
            font-size: 13px;
        }

        /* ── Player Cards ── */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            margin-top: 20px;
            gap: 10px;
        }

        .card {
            background: var(--glass-bg-card);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 10px;
            width: 190px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 148px;
            isolation: isolate;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-default);
            background: var(--glass-bg-card-hover);
        }

        .card:active {
            transform: translateY(0);
        }

        .selected {
            border-color: var(--border-selected) !important;
            background: var(--selected-bg) !important;
            box-shadow: var(--shadow-glow), var(--shadow-md) !important;
        }

        .selected::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-selected);
            pointer-events: none;
            z-index: -1;
        }

        /* ── Card internals ── */
        .number {
            font-size: 44px;
            font-weight: 800;
            color: var(--text-primary);
            margin: 12px 0 4px;
            letter-spacing: -1px;
            line-height: 1;
        }

        .selected .number {
            color: var(--accent-ice);
            text-shadow: var(--selected-number-glow);
        }

        .role {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--role-bg);
            color: var(--text-secondary);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            border: 1px solid var(--border-subtle);
            transition: var(--transition-fast);
        }

        .selected .role {
            border-color: var(--border-active);
            color: var(--text-primary);
        }

        .timer {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 22px;
            margin: 6px 0 4px;
            font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Courier New', monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }

        .selected .timer {
            color: var(--accent-ice);
        }

        .edit-button {
            display: none;
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--edit-btn-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            transition: var(--transition-fast);
            width: 26px;
            height: 26px;
            padding: 0;
            line-height: 1;
        }

        .card:hover .edit-button {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-button:hover {
            color: var(--accent-ice);
            border-color: var(--border-active);
            background: var(--edit-btn-hover);
            transform: scale(1.05);
        }

        .score {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: var(--accent-red);
            color: white;
            min-width: 26px;
            height: 26px;
            border-radius: 13px;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            padding: 0 6px;
            box-shadow: var(--score-shadow);
            letter-spacing: 0;
        }

        /* ── Results area ── */
        .results-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            gap: 20px;
            margin-top: 24px;
        }

        .results-table {
            border-collapse: collapse;
            width: 100%;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-subtle);
        }

        .results-table th,
        .results-table td {
            padding: 11px 14px;
            text-align: center;
            border-bottom: 1px solid var(--border-subtle);
        }

        .results-table th {
            background: var(--th-bg);
            color: var(--accent-ice);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .results-table tr:last-child td {
            border-bottom: none;
        }

        .results-table tr:hover td {
            background: var(--glass-row-hover);
        }

        /* ── Goals display ── */
        #goals-display {
            margin-top: 20px;
            padding: 20px;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-subtle);
            width: 100%;
            max-width: 1400px;
        }

        #goals-display h3 {
            color: var(--accent-ice);
            margin-bottom: 14px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .goal-entry {
            margin: 8px 0;
            padding: 12px 14px;
            background: var(--glass-row-hover);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--border-default);
            transition: var(--transition-fast);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .goal-entry:hover {
            background: var(--glass-bg);
            border-left-color: var(--accent-ice);
        }

        .goal-entry strong {
            color: var(--accent-red);
            font-weight: 600;
        }

        /* ── Form elements ── */
        input,
        select {
            height: 36px;
            padding: 6px 12px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition-fast);
            background: var(--glass-bg-input);
            color: var(--text-primary);
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-ice);
            box-shadow: var(--focus-ring);
        }

        select {
            cursor: pointer;
        }

        /* ── Modals ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: var(--modal-backdrop);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--bg-elevated);
            margin: 8% auto;
            padding: 28px 32px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-default);
            width: auto;
            max-width: 560px;
            min-height: 140px;
            animation: modalFadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .close {
            color: var(--text-muted);
            position: absolute;
            top: 16px;
            right: 18px;
            font-size: 24px;
            font-weight: 300;
            cursor: pointer;
            transition: var(--transition-fast);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            line-height: 1;
        }

        .close:hover {
            color: var(--accent-red);
            background: var(--close-hover);
        }

        .center {
            text-align: center;
            width: 100%;
            margin: 16px 0;
        }

        .modal-content button {
            padding: 10px 22px;
            margin: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            background: var(--accent-ice-dim);
            color: white;
            transition: var(--transition-fast);
            font-family: inherit;
            letter-spacing: 0.02em;
        }

        .modal-content button:hover {
            background: var(--accent-ice);
            box-shadow: var(--modal-btn-glow);
        }

        /* ── Toast notification ── */
        #tipModal {
            z-index: 1001;
            background: var(--accent-green);
            padding: 12px 32px;
            color: white;
            border-radius: 20px;
            text-align: center;
            position: fixed;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.02em;
            opacity: 0;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            transition: opacity 0.4s, top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--toast-shadow);
            pointer-events: none;
        }

        #tipModal.show {
            opacity: 1;
            top: 28px;
        }

        /* ── Watermark ── */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            color: var(--glass-row-hover);
            z-index: 100000;
            pointer-events: none;
            user-select: none;
            font-size: 140px;
            font-weight: 800;
            white-space: nowrap;
            letter-spacing: 8px;
        }

        /* ── Shortcut info ── */
        .shortcut-info {
            background: var(--bg-surface);
            padding: 18px 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-subtle);
            margin-top: 24px;
            width: 100%;
            max-width: 1400px;
        }

        .shortcut-info h3 {
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .shortcut-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 6px;
        }

        .shortcut-item {
            padding: 7px 10px;
            background: var(--glass-row-hover);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .shortcut-key {
            display: inline-block;
            background: var(--glass-bg-hover);
            border: 1px solid var(--border-subtle);
            border-radius: 3px;
            padding: 1px 7px;
            margin: 0 4px;
            font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-primary);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            body {
                padding: 12px 8px 24px;
            }

            .controls {
                padding: 10px 12px;
                gap: 6px;
                top: 6px;
            }

            .controls button {
                padding: 8px 10px;
                font-size: 12px;
                gap: 4px;
            }

            #globalTimer {
                font-size: 28px;
                min-width: 110px;
                padding: 6px 12px;
                margin: 0 4px;
            }

            .container {
                gap: 8px;
                margin-top: 14px;
            }

            .card {
                width: 150px;
                min-height: 138px;
                padding: 8px;
            }

            .number {
                font-size: 34px;
            }

            .timer {
                font-size: 18px;
            }

            .shortcut-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .card {
                width: 130px;
                min-height: 126px;
            }

            .number {
                font-size: 28px;
            }

            .role {
                width: 28px;
                height: 28px;
                font-size: 14px;
                top: 6px;
                left: 6px;
            }

            .timer {
                font-size: 16px;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            #globalTimer {
                font-size: 24px;
                min-width: 90px;
            }

            .controls button {
                font-size: 11px;
                padding: 7px 8px;
            }
        }
    </style>
    <link href="./statics/img/iceHockey.png" rel="SHORTCUT ICON">
</head>
<body>    
    <div class="controls">
        <div id="globalTimer" class="timer">00:00</div>
        
        <div class="fast-controls">
            <button id="rewindButton" class="secondary" title="快退：增加倒计时时间">
                <span>⏮</span>
                <span>快退</span>
            </button>
            <button id="forwardButton" class="secondary" title="快进：减少倒计时时间">
                <span>快进</span>
                <span>⏭</span>
            </button>
        </div>
        
        <button id="startButton" class="success">
            <span>▶</span>
            <span>开始</span>
        </button>
        <button id="pauseButton" class="secondary disabled">
            <span>⏸</span>
            <span>暂停</span>
        </button>
        <button id="addButton" class="accent">
            <span>得分</span>
        </button>
        <button id="reduceButton" class="accent">
            <span>失分</span>
        </button>
        <button id="changeButton" class="secondary">
            <span>全换</span>
        </button>
        <button id="batchButton" class="secondary">
            <span>编辑</span>
        </button>
        <button id="endButton" class="secondary">
            <span>查看</span>
        </button>
        <button id="themeToggle" class="secondary" title="切换日间/暗夜模式">
            <span>🌓</span>
        </button>
        <button id="resetButton" class="danger">
            <span>重置</span>
        </button>
        <button id="exportButton" class="secondary">
            <span>💾</span>
            <span>导出</span>
        </button>
    </div>
    
    <div class="container">
        <!-- 卡片将由JavaScript动态生成 -->
    </div>
    
    <div class="results-container">
        <div id="goals-display" style="display: none;">
            <h3>进球记录</h3>
            <div id="goals-list"></div>
        </div>
        
        <table id="resultsTable" class="results-table" style="display: none;">
            <thead>
            <tr>
                <th>号码</th>
                <th>位置</th>
                <th>经过时长 (分:秒)</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <div class="shortcut-info">
        <h3>操作快捷键</h3>
        <div class="shortcut-grid">
            <div class="shortcut-item">双击<span class="shortcut-key">空格</span> 切换开始/暂停</div>
            <div class="shortcut-item"><span class="shortcut-key">←</span> 快退 (增加倒计时时间)</div>
            <div class="shortcut-item"><span class="shortcut-key">→</span> 快进 (减少倒计时时间)</div>
            <div class="shortcut-item"><span class="shortcut-key">+</span> 得分记录</div>
            <div class="shortcut-item"><span class="shortcut-key">-</span> 失分记录</div>

            <div class="shortcut-item">点击<span class="shortcut-key">编辑</span> 设置选手号码|位置</div>
            <div class="shortcut-item">点击<span class="shortcut-key">查看</span> 显示选手在场时间</div>
            <div class="shortcut-item">点击<span class="shortcut-key">重置</span> 还原计时保留号码|位置</div>
            <div class="shortcut-item">点击<span class="shortcut-key">导出</span> 下载选手在场时间数据</div>
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="center" style="font-weight: 700;font-size: 20px;">设置比赛内容</div>
            <div class="center">
                <table class="results-table" style="width: 100%;">
                    <tbody>
                    <tr>
                        <td>队员人数:</td>
                        <td><input id="input1" type="number" value="15"></td>
                    </tr>
                    <tr>
                        <td>比赛时长(分钟):</td>
                        <td><input id="input2" type="number" value="12"></td>
                    </tr>
                    <tr>
                        <td>主/客队:</td>
                        <td>
                            <select id="input3" style="width:100%;border:none;">
                                <option value="1" selected>主队</option>
                                <option value="2">客队</option>
                            </select>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="center">
                <button id="submitButton">提交</button>
            </div>
        </div>
    </div>

    <div id="batchModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="center" style="font-weight: 700;font-size: 20px;">编辑</div>
            <div class="center">
                <table id="batchTable" class="results-table" style="display: none;width: 100%;">
                    <thead>
                    <tr>
                        <th>号码</th>
                        <th>位置</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="center">
                <button id="batchSubmitButton">提交</button>
            </div>
        </div>
    </div>

    <div id="scoreModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="center" style="font-weight: 700;font-size: 20px;" id="scoreTitle">得分/失分</div>
            <div class="center" id="scoreContext" style="justify-content: center;display: flex;"></div>
            <div class="center">
                <button id="scoreSubmitButton">提交</button>
            </div>
        </div>
    </div>

    <div id="tipModal">
        得分记录成功
    </div>
    <textarea id="copyText" rows="30" cols="50" style="position: fixed;left: 0px;opacity: 0;z-index: -100;"></textarea>

    <script>
    (function() {
        var body = document.body;
        var btn = document.getElementById('themeToggle');
        var saved = localStorage.getItem('timers-theme');
        if (saved === 'light') body.classList.add('light');
        function updateIcon() {
            btn.querySelector('span').textContent = body.classList.contains('light') ? '☀' : '🌓';
        }
        updateIcon();
        btn.addEventListener('click', function() {
            body.classList.toggle('light');
            localStorage.setItem('timers-theme', body.classList.contains('light') ? 'light' : 'dark');
            updateIcon();
        });
    })();
    </script>

    <script src="./statics/js/xlsx.full.min.js"></script>
    <script src="./statics/js/timer_plus.min.js"></script>
    <!-- <script src="./statics/js/timer_plus.js"></script> -->
</body>
</html>
